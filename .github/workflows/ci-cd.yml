name: CI/CD
on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rails test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Resolve image tag
        id: meta
        run: |
          ls -la
          VERSION=$(bin/bundle exec rake version:release | tr -d '\n')
          echo "image_tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}

  deploy:
    needs: build-and-push
    runs-on: deploy-cluster
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to cluster
        run: |
          helm upgrade --install hello-world ./helm/hello-world \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set-string appVersion=${{ needs.build-and-push.outputs.image_tag }} \
            --wait --timeout=120s

  trigger-versioning:
    needs: [deploy, build-and-push]
    uses: learning-mprb/platform-ops/.github/workflows/versioning.yml@main
    with:
      source_repo: ${{ github.event.repository.name }}
      source_ref: ${{ github.ref_name }}
      app_version: ${{ needs.build-and-push.outputs.image_tag }}
      bump_part: patch
    secrets: inherit
